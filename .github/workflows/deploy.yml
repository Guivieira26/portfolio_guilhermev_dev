name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Debug - listar arquivos gerados
        run: |
          echo "=== raiz ==="
          ls -la
          echo "=== dist (se existir) ==="
          ls -la dist/ 2>/dev/null || echo "dist/ não existe"
          echo "=== .output (se existir) ==="
          ls -la .output/ 2>/dev/null || echo ".output/ não existe"
          echo "=== .output/public (se existir) ==="
          ls -la .output/public/ 2>/dev/null || echo ".output/public/ não existe"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/public  # vamos corrigir depois de ver o debug

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4